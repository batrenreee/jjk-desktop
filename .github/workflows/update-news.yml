name: Haber akışını güncelle

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-news.yml"
      - "scripts/update-news-feed.mjs"
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-news-feed
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Node.js hazırla
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Güvenilir kaynakları kontrol et
        run: node scripts/update-news-feed.mjs

      - name: Yeni haberleri kaydet
        shell: bash
        run: |
          if git diff --quiet -- src/data/live-news.json; then
            echo "Yeni haber yok."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/live-news.json
          git commit -m "chore(news): refresh live feed"
          git push
