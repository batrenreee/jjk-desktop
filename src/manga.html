<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JJK Merkez — Manga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body data-page="manga">
    <div id="topbar"></div>

    <main>
      <div class="section">
        <div class="section-head">
          <h2>Manga Takip Listesi</h2>
          <span class="sub">Okuduğun arkları işaretle — ilerlemen cihazında saklanır</span>
          <div class="toolbar">
            <button class="chip" id="resetTracker">Sıfırla</button>
          </div>
        </div>

        <div class="tracker-stats" id="trackerStats"></div>

        <div class="arc-list" id="arcList">
          <p class="empty">Yükleniyor...</p>
        </div>
      </div>
    </main>

    <div class="modal-overlay" id="mangaModal">
      <div class="modal"></div>
    </div>

    <div id="footer"></div>

    <script src="js/app.js"></script>
    <script src="js/manga.js"></script>
  </body>
</html>
